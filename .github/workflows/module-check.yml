name: Module Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check module exports
      run: node scripts/check-exports.js
    
    - name: Check module integration
      run: node scripts/check-integration.js
    
    - name: Check TypeScript compilation
      run: npx tsc --noEmit
