apiVersion: v1
kind: Namespace
metadata:
  name: yuanling
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yuanling-config
  namespace: yuanling
data:
  NODE_ENV: "production"
  PORT: "3000"
  DIMENSIONS: "1024"
  THREAD_COUNT: "4"
---
apiVersion: v1
kind: Secret
metadata:
  name: yuanling-secrets
  namespace: yuanling
type: Opaque
stringData:
  EMBEDDING_API_KEY: "your-api-key-here"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yuanling-api
  namespace: yuanling
  labels:
    app: yuanling
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: yuanling
      component: api
  template:
    metadata:
      labels:
        app: yuanling
        component: api
    spec:
      containers:
      - name: yuanling
        image: yuanling:4.3.0
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: yuanling-config
        - secretRef:
            name: yuanling-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: yuanling-service
  namespace: yuanling
spec:
  selector:
    app: yuanling
    component: api
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yuanling-hpa
  namespace: yuanling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yuanling-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yuanling-ingress
  namespace: yuanling
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: yuanling.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: yuanling-service
            port:
              number: 80
